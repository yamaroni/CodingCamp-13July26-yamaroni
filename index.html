<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="dashboard">

    <!-- Greeting Widget -->
    <section id="greeting-widget" class="card" aria-label="Greeting">
      <div class="greeting-content">
        <p id="clock" class="clock" aria-live="polite" aria-atomic="true">00:00:00</p>
        <p id="date-display" class="date-display">Monday, 1 January 2025</p>
        <h1 id="greeting-text" class="greeting-text">Good Morning</h1>
      </div>
    </section>

    <!-- Focus Timer -->
    <section id="focus-timer" class="card" aria-label="Focus Timer">
      <h2 class="widget-title">Focus Timer</h2>
      <div class="timer-content">
        <p id="timer-display" class="timer-display" aria-live="polite" aria-atomic="true">25:00</p>
        <div class="timer-controls" role="group" aria-label="Timer controls">
          <button id="timer-start" class="btn btn-primary" type="button">Start</button>
          <button id="timer-stop" class="btn btn-secondary" type="button">Stop</button>
          <button id="timer-reset" class="btn btn-secondary" type="button">Reset</button>
        </div>
      </div>
    </section>

    <!-- Todo List -->
    <section id="todo-list" class="card" aria-label="To-Do List">
      <h2 class="widget-title">To-Do List</h2>

      <form id="todo-form" class="input-row" novalidate>
        <label for="todo-input" class="sr-only">New task</label>
        <input
          id="todo-input"
          class="text-input"
          type="text"
          placeholder="Add a new task…"
          maxlength="500"
          autocomplete="off"
          aria-describedby="todo-validation"
        />
        <button class="btn btn-primary" type="submit">Add</button>
      </form>
      <p id="todo-validation" class="validation-msg" role="alert" aria-live="polite"></p>

      <ul id="todo-items" class="todo-items" aria-label="Task list">
        <!-- Tasks rendered here -->
        <li class="empty-state" id="todo-empty">No tasks yet. Add one above!</li>
      </ul>
    </section>

    <!-- Quick Links -->
    <section id="quick-links" class="card" aria-label="Quick Links">
      <h2 class="widget-title">Quick Links</h2>

      <form id="links-form" class="links-form" novalidate>
        <div class="form-group">
          <label for="link-label-input" class="form-label">Label</label>
          <input
            id="link-label-input"
            class="text-input"
            type="text"
            placeholder="e.g. GitHub"
            maxlength="100"
            autocomplete="off"
            aria-describedby="link-label-validation"
          />
          <p id="link-label-validation" class="validation-msg" role="alert" aria-live="polite"></p>
        </div>
        <div class="form-group">
          <label for="link-url-input" class="form-label">URL</label>
          <input
            id="link-url-input"
            class="text-input"
            type="url"
            placeholder="https://example.com"
            maxlength="2048"
            autocomplete="off"
            aria-describedby="link-url-validation"
          />
          <p id="link-url-validation" class="validation-msg" role="alert" aria-live="polite"></p>
        </div>
        <button class="btn btn-primary" type="submit">Add Link</button>
      </form>

      <div id="links-grid" class="links-grid" aria-label="Saved links">
        <!-- Links rendered here -->
        <p class="empty-state" id="links-empty">No links added yet.</p>
      </div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
